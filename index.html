  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --crimson: #A0181F; --crimson-deep: #6E0F14; --crimson-light: #C93040;

    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--ivory); color: var(--ink); overflow-x: hidden; }

    /* NAV */
    nav {

    .nav-logo span { color: var(--gold); display: block; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; font-family: 'DM Sans',sans-serif; }
    .nav-links { display: flex; align-items: center; gap: 28px; }

    .nav-links a:hover { color: var(--crimson); }
    .nav-cta { display: flex; gap: 10px; align-items: center; }
    .nav-cta a { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; text-decoration: none; transition: all 0.25s ease; }
    .nav-cta .call { background: rgba(160,24,31,0.08); color: var(--crimson); }
    .nav-cta .call:hover { background: var(--crimson); color: #fff; }
    .nav-cta .wa { background: rgba(37,211,102,0.1); color: #128C7E; }
    .nav-cta .wa:hover { background: #25D366; color: #fff; }
    @media (max-width:768px) { .nav-links { display: none; } }

    /* HERO */
    .hero {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--crimson-deep) 0%, var(--crimson) 45%, #7B1520 100%);
      display: flex; align-items: center;
      padding: clamp(100px,12vw,140px) clamp(20px,6vw,80px) 80px;
      position: relative; overflow: hidden;
    }
    .hero::before {

      background: repeating-linear-gradient(-55deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 40px);
    }
    .hero-orb { position: absolute; border-radius: 50%; filter: blur(80px); }
    .ho1 { width: 500px; height: 500px; background: rgba(200,150,62,0.18); top: -100px; right: -100px; }
    .ho2 { width: 300px; height: 300px; background: rgba(200,150,62,0.12); bottom: 0; left: 20%; }
    .hero-inner { max-width: 1300px; margin: 0 auto; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; position: relative; z-index: 2; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(200,150,62,0.2); border: 1px solid rgba(200,150,62,0.4); color: var(--gold-light); padding: 6px 16px; border-radius: 50px; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; margin-bottom: 24px; animation: fadeInDown 0.6s ease-out both; }
    .hero-title { font-family: 'Cormorant Garamond',serif; font-size: clamp(3rem,6vw,5.5rem); font-weight: 700; color: #fff; line-height: 1.05; margin-bottom: 24px; animation: fadeInUp 0.7s ease-out 0.1s both; }
    .hero-title em { color: var(--gold-light); font-style: italic; display: block; }
    .hero-sub { font-size: 1.05rem; color: rgba(255,255,255,0.78); line-height: 1.8; margin-bottom: 36px; font-weight: 300; animation: fadeInUp 0.7s ease-out 0.2s both; }
    .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; animation: fadeInUp 0.7s ease-out 0.3s both; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg,var(--gold),#A87030); color: var(--ink); padding: 14px 30px; border-radius: 4px; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em; text-decoration: none; transition: all 0.3s ease; box-shadow: 0 8px 24px rgba(200,150,62,0.35); border: none; cursor: pointer; }

    .btn-ghost { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 14px 30px; border-radius: 4px; font-weight: 500; font-size: 0.9rem; text-decoration: none; transition: all 0.3s ease; }
    .btn-ghost:hover { background: rgba(255,255,255,0.18); transform: translateY(-2px); }
    .hero-stats { display: flex; gap: 32px; margin-top: 48px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.15); animation: fadeInUp 0.7s ease-out 0.4s both; }
    .stat-num { font-family: 'Cormorant Garamond',serif; font-size: 2.4rem; font-weight: 700; color: var(--gold-light); line-height: 1; }
    .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.55); margin-top: 4px; }
    .hero-visual { animation: fadeInRight 0.8s ease-out 0.3s both; }
    .hero-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(200,150,62,0.3); border-radius: 16px; padding: 32px; backdrop-filter: blur(12px); }
    .hero-card-title { font-family: 'Cormorant Garamond',serif; font-size: 1.3rem; color: var(--gold-light); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .hero-card-title::after { content: ''; flex: 1; height: 1px; background: rgba(200,150,62,0.3); }
    .spill { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; transition: all 0.25s; }
    .spill:hover { background: rgba(200,150,62,0.12); border-color: rgba(200,150,62,0.3); }
    .spill-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(200,150,62,0.2); display: flex; align-items: center; justify-content: center; color: var(--gold-light); font-size: 0.9rem; flex-shrink: 0; }
    .spill-text { font-size: 0.88rem; font-weight: 500; color: rgba(255,255,255,0.88); }
    .spill-sub { font-size: 0.73rem; color: rgba(255,255,255,0.45); margin-top: 1px; }
    .hero-note { margin-top: 20px; padding: 12px 16px; background: rgba(200,150,62,0.15); border-radius: 8px; border-left: 3px solid var(--gold); font-size: 0.82rem; color: rgba(255,255,255,0.75); font-style: italic; }
    @media (max-width:900px) { .hero-inner { grid-template-columns: 1fr; } .hero-visual { display: none; } }

    /* SECTIONS BASE */
    section { padding: clamp(60px,10vw,120px) clamp(20px,6vw,80px); }
    .si { max-width: 1200px; margin: 0 auto; }
    .slabel { display: inline-flex; align-items: center; gap: 8px; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 14px; }
    .slabel::before, .slabel::after { content: '—'; opacity: 0.5; }
    .stitle { font-family: 'Cormorant Garamond',serif; font-size: clamp(2rem,4vw,3rem); font-weight: 700; color: var(--ink); line-height: 1.2; margin-bottom: 16px; }
    .stitle span { color: var(--crimson); font-style: italic; }
    .sdesc { font-size: 1rem; color: var(--muted); line-height: 1.85; max-width: 560px; }

    /* SERVICES */
    #services { background: var(--cream); position: relative; overflow: hidden; }
    #services::before { content: ''; position: absolute; top: 0; right: 0; width: 400px; height: 400px; background: radial-gradient(circle,rgba(200,150,62,0.08) 0%,transparent 70%); }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap: 24px; margin-top: 52px; }
    .sc { background: var(--ivory); border: 1px solid rgba(200,150,62,0.15); border-radius: 12px; padding: 36px 30px; position: relative; overflow: hidden; transition: all 0.35s cubic-bezier(0.4,0,0.2,1); }
    .sc::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg,var(--crimson),var(--gold)); transform: scaleX(0); transform-origin: left; transition: transform 0.35s ease; }
    .sc:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(160,24,31,0.1); border-color: rgba(200,150,62,0.35); }
    .sc:hover::before { transform: scaleX(1); }
    .sc-icon { width: 52px; height: 52px; border-radius: 12px; background: linear-gradient(135deg,rgba(160,24,31,0.1),rgba(200,150,62,0.1)); display: flex; align-items: center; justify-content: center; color: var(--crimson); font-size: 1.3rem; margin-bottom: 20px; }
    .sc h3 { font-family: 'Cormorant Garamond',serif; font-size: 1.35rem; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
    .sc p { font-size: 0.88rem; color: var(--muted); line-height: 1.75; }
    .sc-tag { display: inline-block; margin-top: 16px; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--crimson); font-weight: 600; border-bottom: 1px solid var(--crimson); padding-bottom: 2px; }

    /* WHY */
    #why { background: linear-gradient(160deg,var(--crimson-deep) 0%,var(--crimson) 100%); position: relative; overflow: hidden; }
    #why::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='rgba(255,255,255,0.03)'%3E%3Cpath d='M40 0 L80 40 L40 80 L0 40Z'/%3E%3C/g%3E%3C/svg%3E"); }
    .why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; position: relative; z-index: 2; }
    .why-feats { margin-top: 36px; display: flex; flex-direction: column; gap: 20px; }
    .wf { display: flex; align-items: flex-start; gap: 16px; padding: 20px; border-radius: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); transition: background 0.25s; }
    .wf:hover { background: rgba(200,150,62,0.12); }
    .wf-icon { width: 40px; height: 40px; border-radius: 8px; background: rgba(200,150,62,0.25); display: flex; align-items: center; justify-content: center; color: var(--gold-light); flex-shrink: 0; }
    .wf h4 { font-size: 0.95rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .wf p { font-size: 0.82rem; color: rgba(255,255,255,0.6); line-height: 1.6; }
    .testimonials { display: flex; flex-direction: column; gap: 20px; }
    .tc { background: rgba(255,255,255,0.07); border: 1px solid rgba(200,150,62,0.2); border-radius: 12px; padding: 26px; backdrop-filter: blur(8px); }
    .tc-stars { color: var(--gold); font-size: 0.8rem; margin-bottom: 12px; letter-spacing: 3px; }
    .tc-text { font-size: 0.9rem; color: rgba(255,255,255,0.82); line-height: 1.75; font-style: italic; margin-bottom: 16px; }
    .tc-author { display: flex; align-items: center; gap: 12px; }
    .tc-av { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg,var(--gold),var(--crimson)); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond',serif; font-weight: 700; color: #fff; font-size: 1rem; }
    .tc-name { font-size: 0.85rem; font-weight: 600; color: #fff; }
    .tc-loc { font-size: 0.75rem; color: rgba(255,255,255,0.45); }
    @media (max-width:900px) { .why-grid { grid-template-columns: 1fr; gap: 40px; } }

    /* STYLES */
    #styles { background: var(--ivory); }
    .styles-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 20px; margin-top: 52px; }
    .stc { border-radius: 12px; overflow: hidden; background: var(--cream); border: 1px solid var(--border); transition: all 0.3s ease; }
    .stc:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(160,24,31,0.12); }
    .stc-vis { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; position: relative; overflow: hidden; }
    .stc-vis .bp { position: absolute; inset: 0; opacity: 0.08; background: repeating-linear-gradient(45deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 50%); background-size: 10px 10px; }
    .v1 { background: linear-gradient(135deg,#FFF0F0,#FFD6D6); }
    .v2 { background: linear-gradient(135deg,#FFF8EC,#FFE8C0); }
    .v3 { background: linear-gradient(135deg,#F0FFF0,#C6ECC6); }
    .v4 { background: linear-gradient(135deg,#F0F0FF,#D0D0FF); }
    .v5 { background: linear-gradient(135deg,#FFF0F8,#FFD6EC); }
    .v6 { background: linear-gradient(135deg,#F0FFFF,#C0E8FF); }
    .stc-body { padding: 18px; }
    .stc-body h3 { font-family: 'Cormorant Garamond',serif; font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
    .stc-body p { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }
    .stag { display: inline-block; margin-top: 10px; padding: 3px 10px; border-radius: 50px; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .tw { background: rgba(160,24,31,0.08); color: var(--crimson); }
    .td { background: rgba(200,150,62,0.12); color: #8A6020; }
    .te { background: rgba(80,120,200,0.1); color: #3050A0; }
    .tt { background: rgba(40,160,80,0.1); color: #1A7040; }

    /* PROCESS */
    #process { background: var(--cream); }
    .psteps { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; margin-top: 52px; position: relative; }
    .psteps::before { content: ''; position: absolute; top: 36px; left: 12.5%; right: 12.5%; height: 2px; background: linear-gradient(90deg,var(--gold),var(--crimson)); z-index: 0; }
    .pstep { text-align: center; padding: 0 20px; position: relative; z-index: 1; }
    .pnum { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg,var(--crimson),var(--crimson-deep)); color: #fff; font-family: 'Cormorant Garamond',serif; font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; border: 4px solid var(--cream); box-shadow: 0 4px 16px rgba(160,24,31,0.25); }
    .pstep h4 { font-family: 'Cormorant Garamond',serif; font-size: 1.15rem; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .pstep p { font-size: 0.8rem; color: var(--muted); line-height: 1.65; }
    @media (max-width:768px) { .psteps { grid-template-columns: 1fr 1fr; gap: 32px; } .psteps::before { display: none; } }
    @media (max-width:480px) { .psteps { grid-template-columns: 1fr; } }

    /* CLASSES */
    #classes { background: var(--ivory); }
    .classes-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 64px; align-items: start; margin-top: 52px; }
    .clcard { background: var(--cream); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 20px; transition: all 0.25s; }
    .clcard:hover { border-color: var(--crimson); box-shadow: 0 8px 24px rgba(160,24,31,0.08); }
    .clcard-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .clcard-hd h3 { font-family: 'Cormorant Garamond',serif; font-size: 1.3rem; font-weight: 700; color: var(--ink); }
    .cbadge { font-size: 0.72rem; font-weight: 600; padding: 4px 12px; border-radius: 50px; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
    .bg { background: rgba(40,160,80,0.1); color: #1A7040; }
    .ba { background: rgba(160,24,31,0.08); color: var(--crimson); }
    .bp2 { background: rgba(200,150,62,0.12); color: #8A6020; }
    .clcard p { font-size: 0.87rem; color: var(--muted); line-height: 1.75; margin-bottom: 16px; }
    .cmeta { display: flex; gap: 20px; flex-wrap: wrap; }
    .cmeta span { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
    .cmeta i { color: var(--gold); font-size: 0.75rem; }
    .cl-sticky { position: sticky; top: 90px; }
    .cl-box { background: linear-gradient(135deg,var(--crimson-deep),var(--crimson)); border-radius: 16px; padding: 36px; color: #fff; margin-bottom: 20px; }
    .cl-box h3 { font-family: 'Cormorant Garamond',serif; font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .cl-box p { font-size: 0.88rem; color: rgba(255,255,255,0.75); line-height: 1.75; margin-bottom: 24px; }
    .cl-hls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
    .cl-hl { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: rgba(255,255,255,0.85); }
    .cl-hl i { color: var(--gold-light); font-size: 0.75rem; }
    @media (max-width:900px) { .classes-layout { grid-template-columns: 1fr; } .cl-sticky { position: static; } }

    /* FAQ */
    #faq { background: var(--cream); }

    .fi:hover { border-color: rgba(160,24,31,0.3); box-shadow: 0 4px 16px rgba(160,24,31,0.06); }

    /* CONTACT */
    #contact { background: var(--ivory); }

    .crows { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
    .crow { display: flex; align-items: flex-start; gap: 16px; padding: 20px; border-radius: 10px; background: var(--cream); border: 1px solid var(--border); transition: border-color 0.2s; }
    .crow:hover { border-color: rgba(160,24,31,0.3); }
    .crow-icon { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; background: linear-gradient(135deg,rgba(160,24,31,0.1),rgba(200,150,62,0.1)); display: flex; align-items: center; justify-content: center; color: var(--crimson); font-size: 1rem; }
    .crow-lbl { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 3px; }
    .crow-val { font-size: 0.95rem; font-weight: 600; color: var(--ink); }
    .crow-val a { color: var(--crimson); text-decoration: none; }
